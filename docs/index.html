<!DOCTYPE html>
<html lang="en-US">
<head>
	<title>GlasshouseMainPage</title>
	<link rel="stylesheet" type="text/css" href="glasshouseStyle.css">
</head>

<body>
<h1>Glasshouse</h1>
<h3 class="titleText">A review site</h3>


<br>

<form class="leftCol" action="submittedReview.html"
method="post">
	<fieldset>

		<label for="businessSelect" class="leftCol">Enter a restaurant</label>
		<input list="businesses" id="businessSelect" name="businessSelect"
			   class="leftCol" required/>
		<datalist id="businesses">
			<option value="Fabiano's">
			<option value="Sumo">
			<option value="McDonald's">
		</datalist>

		<br>
		<label for="receiptImage">Select a file:</label>
		<input type="file" id="receiptImage" name="receiptImage" required>

		<br>
		<label for="userReview">Write your review below</label><br>
		<textarea id="userReview" name="userReview" rows="10"
				  cols="30" placeholder="Business name" required></textarea>
		<br>
		<input type="submit" value="Submit"/>

	</fieldset>
</form>
